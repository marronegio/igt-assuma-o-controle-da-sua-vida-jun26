name: Deploy via SFTP (TurboCloud)

on:
  push:
    branches: [main]
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions

concurrency:
  group: sftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get update -y && sudo apt-get install -y lftp

      - name: Enviar arquivos via SFTP
        env:
          SFTP_SERVER: ${{ secrets.FTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SFTP_PORT: ${{ vars.SFTP_PORT || '22' }}
          # Pasta de destino no servidor. Se a conta SFTP já cai na pasta
          # certa, deixe o secret vazio que ele usa "./".
          REMOTE_DIR: ${{ secrets.FTP_SERVER_DIR || './' }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:timeout 15;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u '$SFTP_USERNAME','$SFTP_PASSWORD' -p $SFTP_PORT sftp://$SFTP_SERVER;
            mirror --reverse --verbose --parallel=4 \
              --exclude '^\.git' \
              --exclude '^\.github' \
              --exclude '^node_modules' \
              --exclude-glob 'lh-*.json' \
              --exclude-glob '*.md' \
              ./ '$REMOTE_DIR';
          "
